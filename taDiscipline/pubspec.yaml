name: apex
description: "Maîtrise ton quotidien, conquiers tes rêves."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Storage & security
  local_auth: ^2.3.0
  encrypt: ^5.0.3
  crypto: ^3.0.5
  pointycastle: ^3.9.1

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  confetti: ^0.8.0
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.3
  share_plus: ^12.0.2
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  # Offline-first
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # Notifications
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^4.0.0

  # Audio
  just_audio: ^0.9.39
  audio_session: ^0.1.21

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.3

  # AI & chat
  http: ^1.2.1
  flutter_markdown: ^0.7.1

  # Haptics
  vibration: ^2.0.1

  # Stories
  image_picker: ^1.1.2

  # Voice/Video calls
  jitsi_meet_flutter_sdk: ^12.1.3

  # Animations
  simple_animations: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/sounds/
    - assets/icons/

  fonts:
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
          weight: 400
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Variable.ttf
          weight: 400
